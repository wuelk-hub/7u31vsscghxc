<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NRI Dashboard">
  <title>App</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='2' width='24' height='28' rx='4' fill='%23faf9f5' stroke='%23D97757' stroke-width='2'/%3E%3Crect x='8' y='0' width='16' height='5' rx='2.5' fill='%23D97757'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#faf9f5;--bg2:#f0efea;--card:#fff;--text:#141413;--text2:#5c5c5a;--muted:#8c8c8a;--accent:#D97757;--border:#e5e4df;--green:#2d8a4e;--yellow:#b8860b;--red:#c0392b;--blue:#2980b9;--shadow:rgba(20,20,19,.06)}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:0;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:80px}

    .header{position:sticky;top:0;z-index:100;background:var(--bg);padding:16px 16px 0;border-bottom:1px solid var(--border)}
    .header h1{font-size:18px;font-weight:700;letter-spacing:-.02em}
    .header .sub{font-size:11px;color:var(--muted);margin-top:2px}

    .tabs{display:flex;gap:0;background:var(--bg2);margin:12px 0 0;border-radius:10px;padding:3px;overflow-x:auto}
    .tab{flex:1;background:transparent;border:none;padding:8px 6px;font-size:12px;font-weight:600;color:var(--muted);border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;text-align:center;transition:all .2s}
    .tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px var(--shadow)}

    .panel{display:none;padding:16px}
    .panel.active{display:block}

    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:0 1px 3px var(--shadow)}
    .stat-val{font-size:26px;font-weight:700}
    .stat-val.accent{color:var(--accent)}.stat-val.red{color:var(--red)}.stat-val.green{color:var(--green)}.stat-val.yellow{color:var(--yellow)}
    .stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

    .section{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px;padding-left:2px}

    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;box-shadow:0 1px 3px var(--shadow);overflow:hidden}
    .card-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .card-header:active{background:var(--bg2)}
    .card-title{font-size:15px;font-weight:700}
    .card-body{display:none;border-top:1px solid var(--border);padding:12px 16px}
    .card-body.open{display:block}

    .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
    .badge-construction{background:#e8f5e9;color:var(--green)}
    .badge-operating{background:#e3f2fd;color:var(--blue)}
    .badge-disposition{background:#fff3e0;color:var(--yellow)}
    .badge-capital-raise{background:#fce4ec;color:var(--red)}
    .badge-early{background:var(--bg2);color:var(--muted)}

    .task-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
    .task-item:last-child{border-bottom:none}
    .task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
    .task-check.done{background:var(--green);border-color:var(--green);color:#fff;font-size:11px}
    .task-check.urgent{border-color:var(--red)}
    .task-text{font-size:13px;font-weight:500;flex:1}
    .task-text.done{text-decoration:line-through;opacity:.5}
    .task-meta{font-size:11px;color:var(--muted);margin-top:3px}
    .task-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
    .tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
    .tag-urgent{background:#fce4ec;color:var(--red)}
    .tag-waiting{background:#e3f2fd;color:var(--blue)}
    .tag-ok{background:#e8f5e9;color:var(--green)}
    .tag-source{background:var(--bg2);color:var(--text2)}

    .avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

    .person-item{padding:12px 16px;display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--border)}
    .person-item:last-child{border-bottom:none}
    .person-name{font-size:14px;font-weight:600}
    .person-role{font-size:11px;color:var(--muted)}
    .person-org{font-size:11px;color:var(--accent);font-weight:500}

    .alert{background:#fff3e0;border:1px solid #ffe0b2;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:#e65100;font-weight:500}

    .search{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;margin-bottom:12px;-webkit-appearance:none}
    .search:focus{outline:none;border-color:var(--accent)}

    .filters{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    .fbtn{background:var(--card);border:1px solid var(--border);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;color:var(--text2);font-family:inherit;white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

    .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .meta-item .meta-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.04em}
    .meta-item .meta-value{font-size:12px;font-weight:500;color:var(--text)}

    .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:13px}

    .chevron{transition:transform .2s;display:inline-block;font-size:12px;color:var(--muted)}
    .chevron.open{transform:rotate(90deg)}
  </style>
</head>
<body>
  <!-- PIN LOCK -->
  <div id="lockScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:40px;text-align:center">
    <div style="width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div style="font-size:16px;font-weight:600;margin-bottom:4px">Enter PIN</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:24px">Access is restricted</div>
    <input id="pinInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••••" autocomplete="off"
      style="width:160px;text-align:center;font-size:24px;letter-spacing:8px;padding:12px;border:2px solid var(--border);border-radius:12px;background:var(--card);font-family:inherit;-webkit-appearance:none"
      onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
    <button id="pinBtn" onclick="checkPin()"
      style="margin-top:16px;background:var(--accent);color:#fff;border:none;padding:12px 40px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent">
      Unlock
    </button>
    <div id="pinError" style="color:var(--red);font-size:12px;margin-top:12px;display:none">Incorrect PIN</div>
  </div>

  <!-- MAIN APP (hidden until unlocked) -->
  <div id="mainApp" style="display:none">
    <div class="header">
      <h1>NRI Capital Markets</h1>
      <div class="sub">Will Uelk — <span id="updated"></span></div>
      <div class="tabs" id="tabs"></div>
    </div>
    <div id="panels"></div>
  </div>

<script>
// PIN gate
const PIN_HASH='016376';
function checkPin(){
  const v=document.getElementById('pinInput').value;
  if(v===PIN_HASH){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    sessionStorage.setItem('unlocked','1');
    initApp();
  } else {
    document.getElementById('pinError').style.display='block';
    document.getElementById('pinInput').value='';
    document.getElementById('pinInput').style.borderColor='var(--red)';
    setTimeout(()=>{document.getElementById('pinInput').style.borderColor='var(--border)';document.getElementById('pinError').style.display='none'},2000);
  }
}
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPin()});
// Auto-unlock if already unlocked this session
if(sessionStorage.getItem('unlocked')==='1'){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  window.addEventListener('DOMContentLoaded',initApp);
}

function ini(n){return n?n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase():'?'}
function allTasks(){return PROJECTS.flatMap(p=>p.tasks.map(t=>({...t,project:p.name,projectId:p.id})))}
function urgentCount(){return allTasks().filter(t=>!t.done&&t.urgent).length}
function activeCount(){return allTasks().filter(t=>!t.done).length}
function doneCount(){return allTasks().filter(t=>t.done).length}

const tabDefs=[{id:'overview',label:'Overview'},{id:'projects',label:'Projects'},{id:'hb',label:'HB Tracker'},{id:'tasks',label:'Tasks'},{id:'people',label:'People'}];
let activeTab='overview';
const tabsEl=document.getElementById('tabs');
const panelsEl=document.getElementById('panels');

function render(){
  tabsEl.innerHTML=tabDefs.map(t=>`<button class="tab ${t.id===activeTab?'active':''}" data-t="${t.id}">${t.label}</button>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeTab=b.dataset.t;render()});

  if(activeTab==='overview') renderOverview();
  else if(activeTab==='projects') renderProjects();
  else if(activeTab==='hb') renderHBTracker();
  else if(activeTab==='tasks') renderTasks();
  else renderPeople();
}

function renderOverview(){
  const urgent=allTasks().filter(t=>!t.done&&t.urgent);
  panelsEl.innerHTML=`

        <div class="stat"><div class="stat-val yellow">${activeCount()}</div><div class="stat-lbl">Active Tasks</div></div>

}

function renderProjects(){

          <div><div class="card-title">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.location||'Various'}</div></div>
          <span class="badge badge-${p.status}">${p.statusLabel}</span>
        </div>
        <div class="card-body">
          ${p.lender?`<div class="meta-grid" style="margin-bottom:12px"><div class="meta-item"><div class="meta-label">Key Partner</div><div class="meta-value">${p.lender}</div></div><div class="meta-item"><div class="meta-label">Status</div><div class="meta-value">${p.statusLabel}</div></div></div>`:''}
          <div class="section" style="margin-top:0">Tasks (${p.tasks.filter(t=>!t.done).length} active)</div>
          ${p.tasks.map(t=>`
            <div class="task-item">
              <div class="task-check ${t.done?'done':''}${t.urgent&&!t.done?' urgent':''}">${t.done?'&#10003;':''}</div>

                <div class="task-text ${t.done?'done':''}">${t.desc}</div>
                <div class="task-meta">${t.requester} · ${t.due}</div>
                <div class="task-tags">
                  ${t.urgent&&!t.done?'<span class="tag tag-urgent">Urgent</span>':''}
                  ${t.due==='Waiting'||t.due.includes('Waiting')?'<span class="tag tag-waiting">Waiting</span>':''}
                  <span class="tag tag-source">${t.source}</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  </div>`;
}

function renderTasks(){
  let filter='active';
  const draw=()=>{
    let tasks=allTasks();
    if(filter==='active') tasks=tasks.filter(t=>!t.done);
    else if(filter==='urgent') tasks=tasks.filter(t=>!t.done&&t.urgent);
    else if(filter==='done') tasks=tasks.filter(t=>t.done);

    panelsEl.innerHTML=`<div class="panel active">
      <div class="filters" id="tfilters">
        ${['active','urgent','all','done'].map(f=>`<button class="fbtn ${f===filter?'active':''}" data-f="${f}">${f.charAt(0).toUpperCase()+f.slice(1)} (${f==='active'?activeCount():f==='urgent'?urgentCount():f==='done'?doneCount():allTasks().length})</button>`).join('')}
      </div>
      ${tasks.length?tasks.map(t=>`
        <div class="card"><div style="padding:12px 16px">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <div class="task-check ${t.done?'done':''}${t.urgent&&!t.done?' urgent':''}">${t.done?'&#10003;':''}</div>
            <div style="flex:1">
              <div class="task-text ${t.done?'done':''}">${t.desc}</div>
              <div class="task-meta">${t.project}</div>
              <div class="task-meta">${t.requester} · ${t.org} · ${t.due}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic">${t.lastNote}</div>
              <div class="task-tags">
                ${t.urgent&&!t.done?'<span class="tag tag-urgent">Urgent</span>':''}
                <span class="tag tag-source">${t.source}</span>
              </div>
            </div>
          </div>
        </div></div>
      `).join(''):`<div class="empty">No tasks in this filter</div>`}
    </div>`;
    panelsEl.querySelectorAll('#tfilters .fbtn').forEach(b=>b.onclick=()=>{filter=b.dataset.f;draw()});
  };
  draw();
}

function renderPeople(){
  let pfilter='all';
  const draw=()=>{
    let ppl=PEOPLE;
    if(pfilter==='nri') ppl=ppl.filter(p=>p.org==='NRI');
    else if(pfilter==='external') ppl=ppl.filter(p=>p.org!=='NRI');

    panelsEl.innerHTML=`<div class="panel active">
      <div class="filters" id="pfilters">
        ${['all','nri','external'].map(f=>`<button class="fbtn ${f===pfilter?'active':''}" data-f="${f}">${f==='all'?'All':f==='nri'?'NRI Team':'External'}</button>`).join('')}
      </div>
      <div class="card">
        ${ppl.map(p=>`
          <div class="person-item">
            <div class="avatar">${ini(p.name)}</div>
            <div style="flex:1">
              <div class="person-name">${p.name}</div>
              <div class="person-org">${p.org}</div>
              <div class="person-role">${p.role}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
    panelsEl.querySelectorAll('#pfilters .fbtn').forEach(b=>b.onclick=()=>{pfilter=b.dataset.f;draw()});
  };
  draw();
}

function renderHBTracker(){
  const h=HB_TRACKER;
  const committedPpl=h.pipeline.filter(p=>p.status==='Committed');
  const pipelinePpl=h.pipeline.filter(p=>p.status==='Pipeline');
  const targetPpl=h.pipeline.filter(p=>p.status==='Target 2026');

  panelsEl.innerHTML=`<div class="panel active">
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Hacienda Barrigona Capital Tracker &mdash; Updated ${h.updated}</div>

    <div class="section">Raise Summary</div>
    <div class="stats">
      <div class="stat"><div class="stat-val accent">${h.equity.target}</div><div class="stat-lbl">Equity Target</div></div>
      <div class="stat"><div class="stat-val green">${h.equity.committed}</div><div class="stat-lbl">Committed</div></div>
      <div class="stat"><div class="stat-val yellow">${h.bridge.target}</div><div class="stat-lbl">Bridge Target</div></div>
      <div class="stat"><div class="stat-val green">${h.bridge.committed}</div><div class="stat-lbl">Bridge Committed</div></div>
    </div>

    <div class="card">
      <div style="padding:14px 16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px">Equity Raise</div>
        <div style="background:var(--bg2);border-radius:8px;height:12px;overflow:hidden;margin-bottom:6px">
          <div style="background:var(--green);height:100%;width:${h.equity.pctRaised}%;border-radius:8px"></div>
        </div>
        <div style="font-size:11px;color:var(--muted);display:flex;justify-content:space-between">
          <span>${h.equity.committed} committed (${h.equity.committedBy})</span>
          <span>${h.equity.pctRaised}%</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="padding:14px 16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px">Bridge Loan</div>
        <div style="background:var(--bg2);border-radius:8px;height:12px;overflow:hidden;margin-bottom:6px">
          <div style="background:var(--green);height:100%;width:${h.bridge.pctRaised}%;border-radius:8px"></div>
        </div>
        <div style="font-size:11px;color:var(--muted);display:flex;justify-content:space-between">
          <span>${h.bridge.committed} committed (${h.bridge.committedBy})</span>
          <span>${h.bridge.pctRaised}%</span>
        </div>
      </div>
    </div>

    <div class="section">Entity Structure</div>
    <div class="card"><div style="padding:14px 16px">
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-label">Top Entity</div><div class="meta-value">${h.entity.topEntity}</div></div>
        <div class="meta-item"><div class="meta-label">Dev Holdings</div><div class="meta-value">${h.entity.devHoldings}</div></div>
        <div class="meta-item"><div class="meta-label">Committed</div><div class="meta-value">${h.entity.devHoldingsAmt}</div></div>
        <div class="meta-item"><div class="meta-label">Investment Vehicle</div><div class="meta-value">${h.entity.investmentVehicle}</div></div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">${h.entity.investmentNote}</div>
    </div></div>

    <div class="section">Monthly Cash Flow</div>
    <div class="card"><div style="padding:14px 16px">
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-label">Gibson Covers</div><div class="meta-value">${h.cashflow.gibsonCovers}</div></div>
        <div class="meta-item"><div class="meta-label">Reserve</div><div class="meta-value">${h.cashflow.reserveAmt}</div></div>
        <div class="meta-item"><div class="meta-label">Monthly Ops</div><div class="meta-value">${h.cashflow.monthlyOps}</div></div>
        <div class="meta-item"><div class="meta-label">Ending Deficit</div><div class="meta-value" style="color:var(--red)">${h.cashflow.endingDeficit}</div></div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">${h.cashflow.reserveNote}</div>
      <div style="font-size:11px;color:var(--yellow);margin-top:4px;font-weight:500">${h.cashflow.deficitNote}</div>
    </div></div>

    <div class="section">Capital Pipeline</div>
    <div class="card">
      <div style="padding:10px 16px;font-size:12px;font-weight:700;color:var(--green);border-bottom:1px solid var(--border)">Committed</div>
      ${committedPpl.map(p=>`<div style="padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
        <div><div style="font-size:13px;font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.type}</div></div>
        <div style="font-size:13px;font-weight:700;color:var(--green)">${p.amount}</div>
      </div>`).join('')}
      <div style="padding:10px 16px;font-size:12px;font-weight:700;color:var(--yellow);border-bottom:1px solid var(--border)">Pipeline — Needs Next Steps</div>
      ${pipelinePpl.map(p=>`<div style="padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
        <div><div style="font-size:13px;font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.type}</div></div>
        <span class="tag tag-waiting">${p.status}</span>
      </div>`).join('')}
      <div style="padding:10px 16px;font-size:12px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border)">Target Close 2026</div>
      ${targetPpl.map(p=>`<div style="padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
        <div><div style="font-size:13px;font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.type}</div></div>
        <span class="tag tag-source">${p.status}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function toggleCard(el){
  const body=el.nextElementSibling;
  body.classList.toggle('open');
}

render();
} // end initApp
</script>
</body>
</html>
